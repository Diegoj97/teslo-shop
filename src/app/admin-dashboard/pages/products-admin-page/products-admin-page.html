<div class="mb-6">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
        <div>
            <h1 class="text-2xl md:text-3xl font-extrabold text-slate-800 tracking-tight">{{ 'products_list_title' | transloco }}</h1>
            <p class="text-slate-500 text-sm mt-1">{{ 'inventory_admin_subtitle' | transloco }}</p>
        </div>
        <div class="flex items-center gap-3 self-start sm:self-auto">
            <a routerLink="/admin/product/new" class="btn btn-primary btn-sm rounded-xl font-bold gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
                    stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
                {{ 'create_product' | transloco }}
            </a>
            <div class="bg-blue-50 border border-blue-100 rounded-xl px-4 py-2 text-left sm:text-right">
                <span class="text-xs text-blue-600 font-semibold uppercase tracking-wider block">{{ 'total_products' | transloco }}</span>
                <span class="text-2xl font-black text-blue-800">{{ isLoading() ? '...' : totalProducts() }}</span>
            </div>
        </div>
    </div>
    <div class="divider my-4"></div>
</div>

@if (isLoading()) {
<div class="flex justify-center items-center py-12">
    <span class="loading loading-spinner loading-lg text-blue-600"></span>
</div>
} @else {
<proucts-table [products]="products()" [(currentPage)]="currentPage" [totalPages]="totalPages()" />
}
