<div class="flex flex-col gap-4">
  <!-- Imagen Principal -->
  <div class="aspect-square w-full rounded-2xl overflow-hidden bg-base-200 border border-base-300 relative group shadow-inner">
    @if (mainImage()) {
      <img [src]="mainImage() | productImage" alt="Product image" class="w-full h-full object-cover transition-transform duration-500 hover:scale-105" />
    } @else {
      <div class="w-full h-full flex items-center justify-center text-base-content/40">
        {{ 'no_images' | transloco }}
      </div>
    }
  </div>

  <!-- Carrusel de Miniaturas -->
  @if (images().length > 1) {
    <div class="carousel carousel-center w-full p-2 space-x-3 bg-base-200 rounded-2xl border border-base-300">
      @for (img of images(); track img) {
        <div class="carousel-item">
          <button 
            type="button"
            (click)="selectedImage.set(img)"
            [class.ring-2]="mainImage() === img"
            [class.ring-primary]="mainImage() === img"
            [class.border-primary]="mainImage() === img"
            class="w-20 h-20 rounded-xl overflow-hidden border border-base-300 cursor-pointer transition duration-200 hover:opacity-85 focus:outline-none shrink-0">
            <img [src]="img | productImage" alt="Product image thumbnail" class="w-full h-full object-cover" />
          </button>
        </div>
      }
    </div>
  }
</div>
